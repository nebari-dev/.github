name: sign-smoke

# Exercises the sign-oci / sign-blob actions end-to-end against throwaway
# artifacts on every push to a signing-work branch, and on demand. Proves
# journeys 1-5. Signs against ghcr only (this repo has no quay creds).

on:
  push:
    branches:
      - "feat/reusable-signing-actions"
  workflow_dispatch:

env:
  # github.repository for this repo is "nebari-dev/.github". A path segment
  # cannot start with a dot per the OCI/Docker reference-name grammar
  # (path-component must start with [a-z0-9]), so ghcr.io/<repo>/sign-smoke
  # would be an invalid reference. Use repository_owner + a sanitized name.
  SMOKE_IMAGE: ghcr.io/${{ github.repository_owner }}/dot-github-sign-smoke

jobs:
  image:
    name: sign-oci smoke (image)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push throwaway image
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .github/workflows/smoke-image
          push: true
          tags: ${{ env.SMOKE_IMAGE }}:${{ github.sha }}

      - name: Sign + attest
        uses: ./.github/actions/sign-oci
        with:
          image: ${{ env.SMOKE_IMAGE }}
          digest: ${{ steps.build.outputs.digest }}

      - name: Verify signature
        env:
          REF: ${{ env.SMOKE_IMAGE }}@${{ steps.build.outputs.digest }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          cosign verify "$REF" \
            --certificate-identity-regexp "https://github.com/$REPO/.github/workflows/sign-smoke.yaml@.*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com"

      - name: Verify provenance attestation
        env:
          REF: ${{ env.SMOKE_IMAGE }}@${{ steps.build.outputs.digest }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh attestation verify "oci://$REF" --repo "$REPO"

      - name: Verify SBOM attestation has packages
        env:
          REF: ${{ env.SMOKE_IMAGE }}@${{ steps.build.outputs.digest }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh attestation verify "oci://$REF" --repo "$REPO" \
            --predicate-type https://spdx.dev/Document/v2.3 \
            --format json \
            | jq -e '.[0].verificationResult.statement.predicate.packages | length > 0'
